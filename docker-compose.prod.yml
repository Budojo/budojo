services:

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile.prod
    container_name: budojo_api
    restart: always
    ports:
      - "8000:80"
    env_file:
      - .env.production
    networks:
      - budojo_network
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: docker/client/Dockerfile.prod
    container_name: budojo_client
    restart: always
    ports:
      - "80:80"
    networks:
      - budojo_network
    depends_on:
      - api

  db:
    image: mysql:8.4
    container_name: budojo_db
    restart: always
    env_file:
      - .env.production
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - budojo_network

networks:
  budojo_network:
    driver: bridge

volumes:
  db_data:
