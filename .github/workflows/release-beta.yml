name: Beta Release (develop)

on:
  push:
    branches: [develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: "🚀 Release Please (beta)"
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: develop

      - name: Tag summary
        if: steps.release.outputs.release_created
        run: |
          echo "### 🧪 Beta released: ${{ steps.release.outputs.tag_name }}" >> $GITHUB_STEP_SUMMARY
