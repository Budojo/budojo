name: Post-release main → develop sweep

# Fires when semantic-release pushes a stable tag to `main`. The
# develop ruleset forbids direct pushes (per branch-rulesets.md), so
# this workflow opens the canonical
# `chore/sync-main-into-develop-after-vX.Y.Z` PR instead of pushing
# straight. The user merges with the GitHub UI's "Merge" button (one
# click) — the manual gh CLI dance documented in CLAUDE.md § Release
# Flow becomes a half-step.
#
# Why a PR instead of a direct push: pushing to `develop` would need
# either (a) the bot in the develop ruleset's bypass actor list, or
# (b) a PAT secret with bypass authority. Both are admin-only setup
# the workflow itself can't perform. The PR path needs only the
# default GITHUB_TOKEN's `pull-requests: write` permission.
#
# Why `push: tags:` and NOT `release: published`: GitHub Actions
# refuses to fire downstream workflows on `release.published` events
# created by `GITHUB_TOKEN` — a documented safeguard against
# recursive workflow firing. semantic-release publishes via
# GITHUB_TOKEN, so the `release` trigger never fires in practice.
# `push` events on tag refs DO fire under GITHUB_TOKEN, so we trigger
# off the tag push instead. The tag-name glob filter `v*.*.*` plus
# the `!v*-beta*` exclusion gives us the same "stable tags only"
# guard the previous `if:` provided. Caught on the v1.10.0 release.
#
# Sweep merge style: per memory `project_release_merge_style.md`, the
# main→develop sweep MUST use "Create a merge commit" (NOT squash).
# Squash erases the parent linkage and breaks downstream merge
# bookkeeping. The user picks the merge style at click time; the PR
# body reminds them.
#
# Repo setting prerequisite: "Allow GitHub Actions to create and
# approve pull requests" must be enabled in
# Settings → Actions → General → Workflow permissions. Without it,
# `gh pr create` from this workflow fails with
# "GitHub Actions is not permitted to create or approve pull
# requests". Caught on the v1.10.0 release; one-time admin toggle.

on:
  push:
    tags:
      # Stable tags only. Glob (NOT regex): `*` matches any sequence
      # of non-`/` chars. `v*.*.*` matches `v1.10.0` and also
      # `v1.10.0-beta.1`; the second filter line excludes the betas.
      # Tag protection (configured separately in the repo ruleset)
      # ensures only main-merged commits can carry these tags, so
      # we don't need a separate `target_commitish` guard.
      - 'v*.*.*'
      - '!v*-beta*'
  # Manual fallback: re-run from the Actions tab if the push trigger
  # ever misfires (e.g. tag protection rejects the push and the tag
  # is created out of band).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to sweep (e.g. v1.10.0)'
        required: true

jobs:
  sweep:
    name: 'Open sweep PR'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # `--label` and `--assignee` on `gh pr create` go through the
      # Issues API, so the workflow needs `issues: write` even though
      # it's operating on a PR. Copilot caught the missing scope on
      # #309.
      issues: write
      pull-requests: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = 'workflow_dispatch' ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # On `push: tags`, github.ref_name is the tag name
            # without the refs/tags/ prefix (e.g. "v1.10.0").
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout the release tag
        # Cut the sweep branch from the EXACT tag commit, not from
        # the current main HEAD. If main advances after the tag is
        # published (a hotfix lands while the workflow is still
        # queued), checking out main HEAD would carry those extra
        # commits into the sweep PR — title says "v1.9.0" but the
        # diff includes v1.9.1 changes. Tag checkout keeps the
        # sweep deterministic to ${TAG}. Copilot caught this on
        # #309.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ steps.tag.outputs.tag }}
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Verify the tag commit is reachable from main
        # Defense-in-depth on top of the tag-name glob filter. Tag
        # protection rulesets restrict WHO can create tags, not WHICH
        # commit they point at — a stable-looking tag accidentally
        # created on a feature branch would otherwise open a sweep PR
        # from an unmerged commit. Fail fast in that case so we don't
        # silently sweep random changes into develop.
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          TAG_SHA="$(git rev-parse HEAD)"
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "::error::Tag commit $TAG_SHA is not an ancestor of origin/main; refusing to sweep."
            exit 1
          fi

      - name: Cut sweep branch from the tag
        id: branch
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          BRANCH="chore/sync-main-into-develop-after-${TAG}"
          git checkout -b "$BRANCH"
          # Idempotent — re-runs (workflow_dispatch fallback after a
          # transient failure) force-update the existing remote branch
          # instead of deleting it. Deletion under an open PR can
          # mark the PR as having a deleted head (mergeability
          # affected); --force-with-lease keeps the PR alive and
          # refreshes the branch in place. Copilot caught this on
          # #309.
          git push --force-with-lease -u origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Open sweep PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          # PR body passed to gh pr create via --body-file (NOT
          # --body "..."), which is the CLAUDE.md-compatible part —
          # the inline --body shape was getting special-character
          # mangling in practice. Copilot caught the original mistake
          # on #309.
          #
          # CLAUDE.md's general "never use a bash heredoc" guidance
          # targets the heredoc-as-arg-to-gh shape (`gh pr create
          # --body "$(cat <<EOF ... EOF)"`), where the heredoc text
          # is interpolated through shell quoting. The heredoc HERE
          # only writes the body to a file; gh reads it back via
          # --body-file, with no shell-quoting in between. Different
          # context, different rules.
          #
          # The delimiter is intentionally unquoted so `${TAG}`
          # expands from the env: block above. The markdown backticks
          # below are escaped (`\`) so bash doesn't try to
          # command-substitute their content while writing the file.
          cat > /tmp/sweep-body.md <<EOF
          ## What

          Auto-opened by the post-release sweep workflow on the \`${TAG}\` tag push. Brings the release merge commit from \`main\` back into \`develop\` so semantic-release on the next \`develop\` push reads the right base for the next beta tag.

          > **Merge style:** "Create a merge commit" — NOT squash. Squash erases the parent linkage and breaks downstream merge bookkeeping (memory \`project_release_merge_style.md\`).

          > **Copilot wait:** none. Alignment-only — no new code, no review surface (memory \`feedback_release_pr_wait_for_copilot.md\`).

          ## Why

          Without the sweep, \`develop\`'s next beta tag stays on the OLD train (semantic-release can't see the new stable tag from \`develop\`'s history).

          ## What's in the diff

          The release merge commit from main + any commits ahead of develop (should be just the merge commit on a clean release flow).

          ## Manual follow-up

          - Add to project board with \`./.claude/scripts/board-set.sh <PR-N> in-progress\` — the workflow does NOT do this today (project-board GraphQL needs hardcoded IDs that live in the helper script, not in the workflow). One-line manual step.

          ## References

          - Release tag: [${TAG}](https://github.com/m-bonanno/budojo/releases/tag/${TAG})
          - Workflow: \`.github/workflows/post-release-sweep.yml\`
          - Originating issue: #294
          EOF

          # If a PR for this branch already exists (re-run after a
          # transient failure), update its body instead of creating a
          # duplicate.
          EXISTING=$(gh pr list --head "$BRANCH" --base develop --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            echo "Updating existing PR #${EXISTING}"
            gh pr edit "$EXISTING" --body-file /tmp/sweep-body.md
          else
            echo "Creating new sweep PR"
            gh pr create \
              --base develop \
              --head "$BRANCH" \
              --title "chore: sweep ${TAG} release merge commit from main into develop" \
              --body-file /tmp/sweep-body.md \
              --label "🔧 maintenance" \
              --assignee m-bonanno
          fi
