name: Release

on:
  push:
    branches: [main, develop]

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: "🚀 Semantic Release"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # `fetch-depth: 0` alone is not enough — `actions/checkout@v4`
          # defaults to `fetch-tags: false`, and annotated tags aren't
          # reliably accessible to semantic-release without the explicit
          # flag. Without this, semantic-release cannot see prior beta
          # tags on develop and tries to publish v1.0.0-beta.1 from
          # scratch (see #42).
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: npx semantic-release
