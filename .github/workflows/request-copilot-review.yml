name: Request Copilot code review

# Runs when a pull request is opened (or re-opened, or marked ready from
# draft) and automatically adds Copilot as a requested reviewer. Keeps the
# PR author from having to remember it, and keeps the review trigger
# transparent (committed to the repo, visible in the Actions tab).

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  request-copilot:
    name: 🤖 Request Copilot review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Add Copilot as requested reviewer
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: ['Copilot'],
              });
              core.info('Copilot added as reviewer.');
            } catch (error) {
              // Copilot may already be requested (re-open of a previously-requested PR)
              // or the repo may not have the Copilot reviewer enabled. Log and continue —
              // never fail the workflow for this ergonomic nicety.
              core.warning(`Could not request Copilot review: ${error.message}`);
            }
