name: PR Quality Gates

on:
  pull_request:
    # Every PR targeting a protected branch must satisfy the required status
    # checks. Both `main` (stable) and `develop` (beta) are protected by the
    # rulesets in `.github/rulesets/`, so both need CI to run here. Without
    # this, PRs from develop → main would never emit the required contexts
    # and would stay blocked indefinitely.
    branches: [main, develop]

jobs:

  phpstan:
    name: "🔬 PHPStan (level 9)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_sqlite, mbstring, bcmath, gd, zip, intl
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: server/vendor
          key: composer-${{ hashFiles('server/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts
        working-directory: server

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --error-format=github
        working-directory: server

  pest:
    name: "🧪 PEST Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_sqlite, mbstring, bcmath, gd, zip, intl
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: server/vendor
          key: composer-${{ hashFiles('server/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: server

      - name: Copy .env for testing
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi
        working-directory: server

      - name: Generate app key
        run: php artisan key:generate --ansi
        working-directory: server

      - name: Run PEST (parallel, with coverage)
        run: vendor/bin/pest --parallel --coverage
        working-directory: server

  php-cs-fixer:
    name: "🎨 PHP CS Fixer (dry-run)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: server/vendor
          key: composer-${{ hashFiles('server/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts
        working-directory: server

      - name: Run PHP CS Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --ansi --show-progress=none
        working-directory: server

  angular-test:
    name: "🧪 Angular Tests (Vitest)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Run Angular tests
        run: npm test -- --watch=false
        working-directory: client

  angular-lint:
    name: "🔍 Angular Lint (ESLint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Run ESLint
        run: npm run lint
        working-directory: client

  angular-format:
    name: "✨ Angular Format (Prettier)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Check formatting
        run: npm run format:check
        working-directory: client

  cypress-e2e:
    name: "🎭 Cypress E2E"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          working-directory: client
          start: npm run start
          wait-on: "http://localhost:4200"
          wait-on-timeout: 120
          browser: chrome

  openapi-lint:
    name: "🔬 OpenAPI Lint (Spectral)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Spectral
        run: npx -y @stoplight/spectral-cli@6 lint docs/api/v1.yaml
