name: PR Quality Gates

on:
  pull_request:
    # Every PR targeting a protected branch must satisfy the required status
    # checks. Both `main` (stable) and `develop` (beta) are protected by the
    # rulesets in `.github/rulesets/`, so both need CI to run here. Without
    # this, PRs from develop → main would never emit the required contexts
    # and would stay blocked indefinitely.
    branches: [main, develop]

jobs:

  phpstan:
    name: "🔬 PHPStan (level 9)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_sqlite, mbstring, bcmath, gd, zip, intl
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: server/vendor
          key: composer-${{ hashFiles('server/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts
        working-directory: server

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --error-format=github
        working-directory: server

  pest:
    name: "🧪 PEST Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_sqlite, mbstring, bcmath, gd, zip, intl
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: server/vendor
          key: composer-${{ hashFiles('server/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
        working-directory: server

      - name: Copy .env for testing
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi
        working-directory: server

      - name: Generate app key
        run: php artisan key:generate --ansi
        working-directory: server

      - name: Run PEST (parallel, with coverage)
        run: vendor/bin/pest --parallel --coverage
        working-directory: server

  php-cs-fixer:
    name: "🎨 PHP CS Fixer (dry-run)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: server/vendor
          key: composer-${{ hashFiles('server/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts
        working-directory: server

      - name: Run PHP CS Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --ansi --show-progress=none
        working-directory: server

  angular-test:
    name: "🧪 Angular Tests (Vitest)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Run Angular tests
        run: npm test -- --watch=false
        working-directory: client

  angular-lint:
    name: "🔍 Angular Lint (ESLint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Run ESLint
        run: npm run lint
        working-directory: client

  angular-format:
    name: "✨ Angular Format (Prettier)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Check formatting
        run: npm run format:check
        working-directory: client

  # Cypress is the slowest CI gate; sharding across N runners cuts the
  # wall-clock from 5-7 min to ~2-3 min. Manual matrix sharding (no
  # Cypress Cloud account / no $CYPRESS_RECORD_KEY secret needed) —
  # each shard runs a deterministic subset of the spec list via the
  # `--spec` glob built from `ls cypress/e2e/*.cy.ts | awk NR % N == k`.
  # Sort-then-modulo gives a stable mapping that doesn't churn when a
  # spec is added or renamed: a new spec ends up in the (count % N)-th
  # bucket, the others shift by at most one slot. Closes #295.
  #
  # The required-status-check name (`🎭 Cypress E2E`) is preserved by
  # the aggregator job below — `cypress-e2e-shard` produces N matrix
  # checks (`Cypress E2E shard 1` etc.) that the aggregator depends
  # on, so the develop / main rulesets keep working without any
  # ruleset-edit coordination.
  cypress-e2e-shard:
    name: "Cypress E2E shard ${{ matrix.shard }}"
    runs-on: ubuntu-latest
    strategy:
      # Run all shards even if one fails — full visibility on which
      # specs broke per shard. Sequential failures would mask up to
      # N-1 other shards' results.
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    env:
      TOTAL_SHARDS: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Compute spec list for this shard
        id: specs
        working-directory: client
        run: |
          # Sort-then-modulo split. Shard i (1-indexed) gets every
          # (TOTAL_SHARDS)-th spec starting at i. Stable across renames /
          # additions modulo a one-slot shift in the bucket of the new
          # entry.
          mapfile -t SPECS < <(ls cypress/e2e/*.cy.ts | sort)
          SHARD_SPECS=()
          for i in "${!SPECS[@]}"; do
            if [ $(( (i + 1) % TOTAL_SHARDS )) -eq $(( ${{ matrix.shard }} % TOTAL_SHARDS )) ]; then
              SHARD_SPECS+=("${SPECS[$i]}")
            fi
          done
          # Comma-separated for cypress's --spec arg. Empty fallback
          # is `cypress/e2e/__none__.cy.ts` which cypress treats as a
          # no-match; the shard step succeeds with 0 specs. Defensive
          # only — at TOTAL_SHARDS=4 / 18 specs, every shard gets ≥4.
          if [ ${#SHARD_SPECS[@]} -eq 0 ]; then
            echo "spec=cypress/e2e/__none__.cy.ts" >> "$GITHUB_OUTPUT"
          else
            echo "spec=$(IFS=,; echo "${SHARD_SPECS[*]}")" >> "$GITHUB_OUTPUT"
          fi
          echo "Shard ${{ matrix.shard }} runs:"
          printf '  %s\n' "${SHARD_SPECS[@]}"

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          working-directory: client
          start: npm run start
          wait-on: "http://localhost:4200"
          wait-on-timeout: 120
          browser: chrome
          spec: ${{ steps.specs.outputs.spec }}

  cypress-e2e:
    # Aggregator — preserves the `🎭 Cypress E2E` required-status-check
    # name so the develop / main rulesets don't need editing. Fails if
    # any shard failed (`needs.<job>.result` aggregates matrix
    # outcomes via the `success / failure / cancelled / skipped`
    # rollup).
    name: "🎭 Cypress E2E"
    needs: [cypress-e2e-shard]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all Cypress shards passed
        run: |
          if [ "${{ needs.cypress-e2e-shard.result }}" != "success" ]; then
            echo "::error::At least one Cypress shard failed (rollup: ${{ needs.cypress-e2e-shard.result }})"
            exit 1
          fi
          echo "All Cypress shards passed."

  openapi-lint:
    name: "🔬 OpenAPI Lint (Spectral)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Spectral
        run: npx -y @stoplight/spectral-cli@6 lint docs/api/v1.yaml
