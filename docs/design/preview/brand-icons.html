body{margin:0;padding:24px;background:var(--bg-app);min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:640px;display:grid;grid-template-columns:repeat(8,1fr);gap:14px;text-align:center}
.item{display:flex;flex-direction:column;align-items:center;gap:6px}

.i{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--budojo-accent);border-radius:10px;color:#fff}
.i svg{width:22px;height:22px;fill:currentColor;stroke:none;display:block}
.lbl{font:var(--type-caption-2);color:var(--fg-secondary);font-family:var(--font-mono)}
