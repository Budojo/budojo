@if (user(); as u) {
  <div class="profile-page">
    <header class="profile-page__header">
      <h1 class="profile-page__title">Profile</h1>
      <p class="profile-page__subtitle">Account details and verification status.</p>
    </header>

    @if (verifyRequired()) {
      <div class="profile-page__banner" role="alert" data-cy="profile-verify-required-banner">
        <i class="pi pi-info-circle" aria-hidden="true"></i>
        <span>
          You need to verify your email before adding athletes or documents. Check your inbox for
          the verification link, or use the Resend button below.
        </span>
      </div>
    }

    <p-card styleClass="profile-page__card">
      <div class="profile-page__row">
        <span class="profile-page__label">Name</span>
        <span class="profile-page__value" data-cy="profile-name">{{ u.name }}</span>
      </div>

      <div class="profile-page__row">
        <span class="profile-page__label">Email</span>
        <span class="profile-page__value" data-cy="profile-email">{{ u.email }}</span>
      </div>

      <div class="profile-page__row profile-page__row--status">
        <span class="profile-page__label">Verification</span>
        <app-email-verification-status />
      </div>
    </p-card>
  </div>
}
