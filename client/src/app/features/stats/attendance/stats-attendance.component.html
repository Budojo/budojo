<section class="stats-attendance" data-cy="stats-attendance">
  <header class="stats-attendance__header">
    <h2 class="stats-attendance__title">{{ 'stats.attendance.monthlyTitle' | translate }}</h2>
    <p class="stats-attendance__hint">{{ 'stats.attendance.monthlyHint' | translate }}</p>
  </header>

  @if (loading()) {
    <p-skeleton height="20rem" data-cy="stats-attendance-loading" />
  } @else if (errored()) {
    <p class="stats-attendance__error" data-cy="stats-attendance-error">
      {{ 'stats.attendance.errored' | translate }}
    </p>
  } @else if (isEmpty()) {
    <p class="stats-attendance__empty" data-cy="stats-attendance-empty">
      {{ 'stats.attendance.empty' | translate }}
    </p>
  } @else {
    <div class="stats-attendance__chart">
      <p-chart
        type="bar"
        [data]="chartData()"
        [options]="chartOptions"
        data-cy="stats-attendance-chart"
      />
    </div>
  }
</section>
