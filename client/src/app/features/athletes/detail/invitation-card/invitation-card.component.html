<p-card styleClass="invitation-card">
  <!--
    `data-cy` lives on the inner wrapper, not the `<p-card>` host.
    PrimeNG's <p-card> doesn't forward arbitrary HTML attributes to
    the rendered host element, so a Cypress selector on the host
    would never resolve.
  -->
  <div class="invitation-card__inner" data-cy="athlete-invitation-card">
    <div class="invitation-card__header">
      <span class="invitation-card__eyebrow">{{ 'athletes.invitation.title' | translate }}</span>
    </div>

    @if (!hasEmail()) {
      <p class="invitation-card__hint" data-cy="athlete-invitation-no-email">
        {{ 'athletes.invitation.noEmail' | translate }}
      </p>
    } @else if (invitation(); as inv) {
      @if (inv.state === 'pending') {
        <div class="invitation-card__row" data-cy="athlete-invitation-pending">
          <p-tag
            severity="info"
            [rounded]="true"
            [value]="'athletes.invitation.pendingChip' | translate: pendingChipParams() ?? {}"
            data-cy="athlete-invitation-pending-chip"
          />
          <div class="invitation-card__actions">
            <p-button
              [label]="'athletes.invitation.resend' | translate"
              icon="pi pi-send"
              severity="secondary"
              [outlined]="true"
              size="small"
              [loading]="resending()"
              [disabled]="resending() || revoking()"
              (onClick)="resend()"
              data-cy="athlete-invitation-resend"
            />
            <p-button
              [label]="'athletes.invitation.revoke' | translate"
              severity="secondary"
              [text]="true"
              size="small"
              [disabled]="resending() || revoking()"
              (onClick)="confirmRevoke($event)"
              data-cy="athlete-invitation-revoke"
            />
          </div>
        </div>
      } @else {
        <div class="invitation-card__row" data-cy="athlete-invitation-accepted">
          <p-tag
            severity="success"
            [rounded]="true"
            icon="pi pi-check"
            [value]="'athletes.invitation.acceptedChip' | translate: acceptedChipParams() ?? {}"
            data-cy="athlete-invitation-accepted-chip"
          />
        </div>
      }
    } @else {
      <p class="invitation-card__hint">
        {{ 'athletes.invitation.emptyHint' | translate }}
      </p>
      <p-button
        [label]="'athletes.invitation.invite' | translate"
        icon="pi pi-user-plus"
        severity="secondary"
        [outlined]="true"
        size="small"
        [loading]="sending()"
        (onClick)="invite()"
        data-cy="athlete-invitation-invite"
      />
    }

    <p-confirmpopup />
  </div>
</p-card>
