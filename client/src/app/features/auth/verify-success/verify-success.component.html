<div class="verify-page">
  <div class="verify-page__icon">
    <i class="pi pi-check-circle" aria-hidden="true"></i>
  </div>
  <h1 class="verify-page__title">{{ 'auth.verifySuccess.title' | translate }}</h1>
  <p class="verify-page__message">{{ 'auth.verifySuccess.message' | translate }}</p>
  <p-button
    type="button"
    severity="secondary"
    [text]="true"
    [label]="'auth.verifySuccess.cta' | translate"
    (onClick)="goToDashboard()"
    data-cy="verify-success-go"
  />
</div>
