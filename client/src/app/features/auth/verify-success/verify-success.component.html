<div class="verify-page">
  <div class="verify-page__icon">
    <i class="pi pi-check-circle" aria-hidden="true"></i>
  </div>
  <h1 class="verify-page__title">Email verified</h1>
  <p class="verify-page__message">You're all set. Redirecting you to the dashboard…</p>
  <p-button
    type="button"
    severity="secondary"
    [text]="true"
    label="Go now"
    (onClick)="goToDashboard()"
    data-cy="verify-success-go"
  />
</div>
