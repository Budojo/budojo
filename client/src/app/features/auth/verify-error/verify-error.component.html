<div class="verify-page">
  <div class="verify-page__icon">
    <i class="pi pi-times-circle" aria-hidden="true"></i>
  </div>
  <h1 class="verify-page__title">Verification link invalid</h1>
  <p class="verify-page__message">
    The link may have expired or been tampered with. Request a fresh one from your profile and we'll
    send a new email.
  </p>

  @if (canResend) {
    <p-button
      type="button"
      severity="primary"
      label="Send a new link"
      (onClick)="resend()"
      data-cy="verify-error-resend"
    />
  } @else {
    <p-button
      type="button"
      severity="primary"
      label="Sign in"
      (onClick)="goToLogin()"
      data-cy="verify-error-login"
    />
  }
</div>
