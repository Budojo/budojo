<div class="verify-page">
  <div class="verify-page__icon">
    <i class="pi pi-times-circle" aria-hidden="true"></i>
  </div>
  <h1 class="verify-page__title">{{ 'auth.verifyError.title' | translate }}</h1>
  @if (canResend) {
    <p class="verify-page__message">{{ 'auth.verifyError.messageCanResend' | translate }}</p>
  } @else {
    <p class="verify-page__message">{{ 'auth.verifyError.messageCannotResend' | translate }}</p>
  }

  @if (canResend) {
    <p-button
      type="button"
      severity="primary"
      [label]="'auth.verifyError.resendCta' | translate"
      (onClick)="resend()"
      data-cy="verify-error-resend"
    />
  } @else {
    <p-button
      type="button"
      severity="primary"
      [label]="'auth.verifyError.signinCta' | translate"
      (onClick)="goToLogin()"
      data-cy="verify-error-login"
    />
  }
</div>
