<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Budojo</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="Budojo — BJJ gym management. Track athletes, documents, and attendance."
    />
    <meta name="theme-color" content="#0a0a0b" />

    <!-- PWA manifest (icons, name, theme, start_url). -->
    <link rel="manifest" href="manifest.webmanifest" />

    <!-- Favicons + installable icons (#183).
         Default is the WHITE-stroke variant — modern browsers (Chrome, Brave,
         Edge, Firefox) ship with a dark tab strip even when the OS is in
         light mode, and a black logo disappears against it. The dark-stroke
         variant is offered conditionally for OS-light pinned-tab contexts
         where the tab background is white; UA support for `media` on
         `<link rel="icon">` is partial (Safari is incomplete), so when the
         media query is ignored we still fall back to the white variant —
         which is the more visible state across our actual user base.
         Legacy browsers fall through to the ICO. The 192 PNG stays as a
         Chromium downscale hint, and apple-touch-icon stays for iOS
         "Add to Home Screen". -->
    <link rel="icon" type="image/svg+xml" href="favicon-light.svg" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="favicon.svg"
      media="(prefers-color-scheme: light)"
    />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

    <!-- iOS PWA meta: capable + status-bar style. Deprecated in name but still
         honoured by Safari on iOS 16.4+, which is our PWA floor. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Budojo" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
