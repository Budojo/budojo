<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Budojo</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="Budojo — BJJ gym management. Track athletes, documents, and attendance."
    />
    <meta name="theme-color" content="#0a0a0b" />

    <!-- PWA manifest (icons, name, theme, start_url). -->
    <link rel="manifest" href="manifest.webmanifest" />

    <!-- Favicons + installable icons.
         Modern Chromium / Firefox / Safari pick the SVG (crisp at any DPI),
         legacy browsers fall through to the ICO. The light-stroke variant
         carries a white stroke so dark UA tab strips don't render the
         favicon invisible — browsers honour the `media` query on icon links
         since ~2020 (Chromium 80+, Firefox 89+, partial on Safari).
         The 192 PNG stays as a Chromium downscale hint (better than ICO's
         48 px bitmap), and apple-touch-icon stays for iOS "Add to Home
         Screen". -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="favicon-light.svg"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

    <!-- iOS PWA meta: capable + status-bar style. Deprecated in name but still
         honoured by Safari on iOS 16.4+, which is our PWA floor. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Budojo" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
