<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Budojo</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="Budojo — BJJ gym management. Track athletes, documents, and attendance."
    />
    <meta name="theme-color" content="#0a0a0b" />

    <!-- PWA manifest (icons, name, theme, start_url). -->
    <link rel="manifest" href="manifest.webmanifest" />

    <!-- Favicons + installable icons.
         Multiple sizes so every browser can pick the right tile:
         - ICO for legacy Chrome / any fallback
         - 32 / 192 PNG for modern Chromium tabs (larger = crisper high-DPI)
         - apple-touch-icon for iOS Safari "Add to Home Screen" -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

    <!-- iOS PWA meta: capable + status-bar style. Deprecated in name but still
         honoured by Safari on iOS 16.4+, which is our PWA floor. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Budojo" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
